<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Wheels (violet) -->
  <circle cx="8" cy="22" r="7" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="24" cy="22" r="7" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <!-- Wheel hubs -->
  <circle cx="8" cy="22" r="1.5" fill="#7C3AED"/>
  <circle cx="24" cy="22" r="1.5" fill="#7C3AED"/>
  <!-- Frame (orange) -->
  <!-- Chain stay: rear axle to bottom bracket -->
  <line x1="8" y1="22" x2="15" y2="22" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat stay: rear axle to seat junction -->
  <line x1="8" y1="22" x2="13" y2="11" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat tube: bottom bracket to seat junction -->
  <line x1="15" y1="22" x2="13" y2="11" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Top tube: seat junction to head tube -->
  <line x1="13" y1="11" x2="22" y2="11" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Down tube: bottom bracket to head tube -->
  <line x1="15" y1="22" x2="22" y2="11" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork: head tube to front axle -->
  <line x1="22" y1="11" x2="24" y2="22" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat (violet) -->
  <line x1="11" y1="9" x2="15" y2="9" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebar (violet) -->
  <line x1="21" y1="9" x2="25" y2="9" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
</svg>
